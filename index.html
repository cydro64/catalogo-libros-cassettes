<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catálogo de Libros y Cassettes</title>
    <meta
      name="description"
      content="Explora el catálogo de libros y cassettes disponibles, filtra por categoría y arma tu pedido en minutos."
    />
    <meta property="og:title" content="Catálogo de Libros y Cassettes" />
    <meta
      property="og:description"
      content="Explora el catálogo de libros y cassettes disponibles, filtra por categoría y arma tu pedido en minutos."
    />
    <meta property="og:image" content="img/CSST-001.webp" />
    <meta property="og:url" content="/catalogo-libros-cassettes/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catálogo de Libros y Cassettes" />
    <meta
      name="twitter:description"
      content="Explora el catálogo de libros y cassettes disponibles, filtra por categoría y arma tu pedido en minutos."
    />
    <meta name="twitter:image" content="img/CSST-001.webp" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>Catálogo Libros y Cassettes</h1>
        <div class="header-botones">
          <a href="flyer.html" class="boton-flyer" target="_blank">📢 Publicidad</a>
          <button
            id="toggle-carrito"
            class="cart-toggle"
            type="button"
            aria-controls="carrito"
            aria-expanded="false"
          >
            <span class="cart-icon" aria-hidden="true">🛒</span>
            <span class="cart-text">Carrito</span>
            <span id="carrito-count" class="cart-badge" aria-label="Artículos en el carrito">0</span>
          </button>
        </div>
      </div>
    </header>
    <div id="carrito-overlay" class="carrito-overlay" hidden></div>
    <section id="filtros">
      <h2>Filtros por categoría</h2>
    </section>
    <div id="productos"></div>
    <aside id="carrito" aria-hidden="true">
      <div class="carrito-header">
        <h2>Pedido</h2>
        <button id="cerrar-carrito" class="carrito-cerrar" type="button">Cerrar</button>
      </div>
      <ul id="lista-carrito"></ul>
      <p id="total-carrito"></p>
      <div class="acciones-carrito">
        <button id="vaciar-carrito" type="button">Vaciar</button>
        <a
          id="enviar-pedido"
          class="boton-whatsapp"
          href="https://wa.me/56976449957"
          target="_blank"
          rel="noopener"
        >
          <img src="img/whatsapp.svg" alt="" class="icono-whatsapp" aria-hidden="true" />
          Enviar pedido por WhatsApp al vendedor
        </a>
      </div>
      <p id="carrito-error" class="error"></p>
    </aside>
    <script src="js/carritoManager.js"></script>
    <script src="js/order.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
